version: "3.9"
services:
  mongodb:
    image: mongo:latest
    container_name: omnis-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    
  redis:
    image: redis:latest
    container_name: omnis-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: omnis-backend
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    depends_on:
      - mongodb
      - redis
volumes:
  mongo-data: